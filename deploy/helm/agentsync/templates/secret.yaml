apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentsync.fullname" . }}-secret
  labels: {{- include "agentsync.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  DATABASE_URL: {{ include "agentsync.databaseUrl" . | quote }}
  REDIS_URL: {{ include "agentsync.redisUrl" . | quote }}
