apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentsync.fullname" . }}-web
  labels: {{- include "agentsync.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.web.repository }}:{{ .Values.image.web.tag }}"
          imagePullPolicy: {{ .Values.image.web.pullPolicy }}
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: AGENTSYNC_API_URL
              value: "http://{{ include "agentsync.fullname" . }}-server:3000"
            - name: PUBLIC_BASE_URL
              value: {{ .Values.publicBaseUrl | quote }}
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentsync.fullname" . }}-web
  labels: {{- include "agentsync.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: web
